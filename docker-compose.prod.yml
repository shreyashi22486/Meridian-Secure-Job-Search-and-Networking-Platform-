# ─────────────────────────────────────────────────────────────────────────
# Meridian — Production Deployment (No Source Code)
# This file runs pre-built images from GHCR. No local builds.
# Place on server at: /opt/meridian/docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-secure_job_portal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (Pre-built from GHCR) ─────────────────────────────────
  backend:
    image: ghcr.io/angadjeet/secure-job-portal/backend:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-secure_job_portal}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-1440}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      UPLOAD_DIR: ./data/resumes
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-2097152}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      APP_NAME: ${APP_NAME:-Meridian}
      DEBUG: "false"
    volumes:
      - resume_data:/app/data/resumes
      - avatar_data:/app/data/avatars
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Pre-built from GHCR — Nginx + static files) ─────────
  frontend:
    image: ghcr.io/angadjeet/secure-job-portal/frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/meridian/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  resume_data:
  avatar_data:
# Deployment trigger
