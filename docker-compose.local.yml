# ─────────────────────────────────────────────────────────────────────────
# Nexora — Local Development with Docker Compose
# Usage:  docker compose up --build
# ─────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-secure_job_portal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Uvicorn) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-secure_job_portal}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-1440}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      UPLOAD_DIR: ./data/resumes
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-2097152}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      APP_NAME: ${APP_NAME:-Nexora}
      DEBUG: ${DEBUG:-false}
    volumes:
      - resume_data:/app/data/resumes
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  resume_data:
