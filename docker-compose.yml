# ─────────────────────────────────────────────────────────────────────────
# Secure Job Portal — Docker Compose (Server Deployment)
# Replaces start_servers.sh / nohup-based deployment
#
# Usage:
#   docker compose up --build -d          # Build & start everything
#   docker compose logs -f                # Follow logs
#   docker compose down                   # Stop everything
#   docker compose ps                     # Check status
# ─────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sjp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-secure_job_portal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-secure_job_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - sjp-network

  # ── Backend (FastAPI + Uvicorn) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sjp-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-secure_job_portal}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-please-1234567890abcdef}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-1440}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      FERNET_KEY: ${FERNET_KEY}
      UPLOAD_DIR: ./data/resumes
      AVATAR_DIR: ./data/avatars
      PKI_KEY_DIR: ./data/pki
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-2097152}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://192.168.2.233,http://localhost}
      APP_NAME: ${APP_NAME:-Secure Job Portal}
      DEBUG: ${DEBUG:-false}
    volumes:
      - resume_data:/app/data/resumes
      - avatar_data:/app/data/avatars
      - pki_data:/app/data/pki
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - sjp-network

  # ── Frontend (Nginx + Static Build) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sjp-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certs if you have them; comment out if HTTP-only
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || curl -fk https://localhost:443/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - sjp-network

volumes:
  pgdata:
    name: sjp-pgdata
  resume_data:
    name: sjp-resume-data
  avatar_data:
    name: sjp-avatar-data
  pki_data:
    name: sjp-pki-data

networks:
  sjp-network:
    name: sjp-network
    driver: bridge
